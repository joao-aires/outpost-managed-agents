name: Outpost CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Unit, Integration & E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt
          uv pip install pytest pytest-asyncio httpx greenlet uvicorn

      - name: Run Test Suite (Unit, Integration, E2E)
        env:
          SANDBOX_DRIVER: "mock"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        run: |
          uv run pytest -v
