name: CI — Fast Unit & Integration Checks

on:
  push:
    branches: [ main, feat/*, fix/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: uv sync

      - name: Run Fast Unit & Integration Tests (Excluding E2E & Benchmarks)
        run: uv run pytest -m "not e2e and not benchmark" -v

      - name: Lint & Helm Template Check
        run: |
          helm lint charts/outpost-managed-agents
          helm template outpost-test charts/outpost-managed-agents
