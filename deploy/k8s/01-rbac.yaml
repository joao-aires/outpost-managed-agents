apiVersion: v1
kind: ServiceAccount
metadata:
  name: outpost-controller
  namespace: outpost-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: outpost-pod-manager
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log", "pods/status", "namespaces", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: outpost-pod-manager-binding
subjects:
  - kind: ServiceAccount
    name: outpost-controller
    namespace: outpost-system
roleRef:
  kind: ClusterRole
  name: outpost-pod-manager
  apiGroup: rbac.authorization.k8s.io
