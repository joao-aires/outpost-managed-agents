# Default values for outpost-managed-agents Helm Chart.

replicaCount: 1

image:
  repository: outpost-managed-agents
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "outpost-controller"

rbac:
  create: true

# Control Plane Environment & Business Configuration
config:
  projectName: "OutpostManagedAgents"
  apiV1Prefix: "/v1"
  sandboxDriver: "direct" # direct, sigs-sandbox, or mock
  kubernetesNamespace: "agent-sandboxes"
  createSandboxNamespace: false
  sandboxImage: "outpost-sandbox:latest"
  warmPoolSize: 3
  allowedEgressDomains: "api.github.com,github.com,pypi.org,files.pythonhosted.org"
  llmProvider: "anthropic" # anthropic, ollama, or custom
  llmBaseUrl: "" # e.g. "http://127.0.0.1:11434" for local Ollama

# Secrets
secrets:
  anthropicApiKey: ""
  webhookSecret: "super_secret_webhook_key"

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: outpost.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: outpost-tls
  #    hosts:
  #      - outpost.local

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
