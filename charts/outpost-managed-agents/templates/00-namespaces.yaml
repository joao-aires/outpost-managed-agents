{{- if .Values.config.createSandboxNamespace }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.config.kubernetesNamespace | quote }}
  labels:
    {{- include "outpost.labels" . | nindent 4 }}
    outpost-cma/role: "sandbox-namespace"
    pod-security.kubernetes.io/enforce: {{ .Values.securityHardening.podSecurityNamespaceEnforce | quote }}
    pod-security.kubernetes.io/enforce-version: "latest"
{{- end }}
