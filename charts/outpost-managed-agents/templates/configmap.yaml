apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "outpost.fullname" . }}-config
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "outpost.labels" . | nindent 4 }}
data:
  PROJECT_NAME: {{ .Values.config.projectName | quote }}
  API_V1_STR: {{ .Values.config.apiV1Prefix | quote }}
  SANDBOX_DRIVER: {{ .Values.config.sandboxDriver | quote }}
  KUBERNETES_NAMESPACE: {{ .Values.config.kubernetesNamespace | quote }}
  SANDBOX_IMAGE: {{ .Values.config.sandboxImage | quote }}
  WARM_POOL_SIZE: {{ .Values.config.warmPoolSize | quote }}
  ALLOWED_EGRESS_DOMAINS: {{ .Values.config.allowedEgressDomains | quote }}
  LLM_PROVIDER: {{ .Values.config.llmProvider | quote }}
  LLM_BASE_URL: {{ .Values.config.llmBaseUrl | quote }}
