apiVersion: v1
kind: Secret
metadata:
  name: {{ include "outpost.fullname" . }}-secrets
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "outpost.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | default "" | quote }}
  WEBHOOK_SECRET: {{ .Values.secrets.webhookSecret | default "super_secret_webhook_key" | quote }}
